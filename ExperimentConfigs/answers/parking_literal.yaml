models:
  - "openai/gpt-5.5-pro"
  - "anthropic/claude-opus-4.7"
  - "moonshotai/kimi-k2.6"
  - "google/gemini-3.5-flash"
questions_csv: "../Questions/parking_literal.csv"
output_csv: "../Answers/parking_literal-answers.csv"
runs_per_question: 1
max_workers: 4
use_redis_cache: false
measure_performance: false
timeout_seconds: 45
system_prompt: "Return only the requested answer token or phrase, in lowercase, with no punctuation and no explanation."
reasoning:
  max_tokens: 65536
